name: Publish wiki

on:
    push:
        branches: [master]
        paths:
            - 'wiki/**'
            - '.github/workflows/publish-wiki.yml'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Sync wiki folder to GitHub Wiki
              uses: Andrew-Chen-Wang/github-wiki-action@v4
              with:
                  path: wiki
                  strategy: init
                  token: ${{ secrets.GITHUB_TOKEN }}
