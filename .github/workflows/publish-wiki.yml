name: Publish wiki

on:
    push:
        branches: [master]
        paths:
            - 'wiki/**'
            - '.github/workflows/publish-wiki.yml'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Publish to GitHub Wiki
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
              run: |
                  set -e
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
                  WORKDIR="wiki-publish"
                  rm -rf "$WORKDIR"

                  if git clone "$WIKI_URL" "$WORKDIR" 2>/dev/null; then
                    echo "Cloned existing wiki"
                  else
                    echo "Initializing new wiki repository"
                    mkdir -p "$WORKDIR"
                    cd "$WORKDIR"
                    git init
                    git remote add origin "$WIKI_URL"
                    cd ..
                  fi

                  cp wiki/*.md "$WORKDIR/"
                  cd "$WORKDIR"
                  git add -A
                  git diff --staged --quiet && echo "No wiki changes" && exit 0
                  git commit -m "Update wiki from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
                  git branch -M master
                  git push -f origin master
